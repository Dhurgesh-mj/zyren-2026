version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: eventiq-db
    environment:
      POSTGRES_USER: eventiq
      POSTGRES_PASSWORD: eventiq_secure_2026
      POSTGRES_DB: eventiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: eventiq-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: eventiq-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://eventiq:eventiq_secure_2026@postgres:5432/eventiq
      REDIS_URL: redis://redis:6379
      SECRET_KEY: eventiq-super-secret-key-change-in-production-2026
      QR_SECRET_KEY: qr-signing-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALGORITHM: HS256
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build: ./frontend
    container_name: eventiq-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: eventiq-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
